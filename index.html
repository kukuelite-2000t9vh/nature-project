<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nature – A Living World</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="natureCanvas"></canvas>

  <div id="ui">

  </div>

  <script src="js/app.js"></script>

</html>
